name: tests

# Disabled automatic runs — trigger manually from the Actions tab if needed.
# To re-enable, restore the push/pull_request triggers below.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        # build:ssr builds BOTH the client and SSR bundles — the SSR bundle
        # (bootstrap/ssr/app.js) is what lets tests/Feature/Ssr/SsrRenderTest.php
        # run instead of skip, catching window/document-in-SSR crashes pre-merge.
        run: npm run build:ssr

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test
